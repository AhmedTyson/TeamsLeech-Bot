<!DOCTYPE html>
<html>
<body style="background:#05050a; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;">
<svg viewBox="0 0 100 100" width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Stand -->
  <g stroke="#3b0764" stroke-width="2.5" stroke-linecap="round">
    <line x1="30" y1="70" x2="30" y2="90" />
    <line x1="22" y1="90" x2="38" y2="90" />
  </g>

  <!-- Dish rotated 35 degrees up-right -->
  <g transform="rotate(-35 45 50)">
    <!-- Back bowl (darkest) -->
    <path d="M 45 15 A 30 35 0 0 0 45 85 A 20 35 0 0 1 45 15" fill="#1e1b4b" stroke="#e9d5ff" stroke-width="1.5" />
    
    <!-- Front rim (ellipse) -->
    <ellipse cx="45" cy="50" rx="20" ry="35" fill="#2e1065" stroke="#e9d5ff" stroke-width="1.5" />
    
    <!-- Inner lines radiating from center -->
    <g stroke="#6b21a8" stroke-width="1.5">
       <line x1="45" y1="15" x2="45" y2="85" />
       <line x1="25" y1="50" x2="65" y2="50" />
       
       <!-- Diagonal lines -->
       <line x1="31" y1="25" x2="59" y2="75" />
       <line x1="31" y1="75" x2="59" y2="25" />
    </g>

    <!-- Center Node -->
    <circle cx="45" cy="50" r="5" fill="#1e1b4b" stroke="#c084fc" stroke-width="2.5" filter="url(#glow)"/>
    <circle cx="45" cy="50" r="1.5" fill="#ffffff" />
  </g>

  <!-- Radar Waves (positioned relative to the rotated dot) -->
  <!-- Let's just place them manually -->
  <g stroke="#a855f7" stroke-width="3" stroke-linecap="round" fill="none" filter="url(#glow)">
      <!-- Central point is around (60, 32) after rotation -->
      <path d="M 68 25 A 15 15 0 0 1 78 45" />
      <path d="M 75 16 A 25 25 0 0 1 88 53" />
      <path d="M 82 7 A 35 35 0 0 1 98 61" />
  </g>
</svg>
</body>
</html>
